# TSNN Default Configuration
# Equivariant Temporal Sheaf Networks for Protein-Ligand Dissociation Kinetics

model:
  node_input_dim: 29   # max(21 atom, 21 residue) + 3 type flags + 1 charge + 1 SASA + 1 disp + 1 RMSF + 1 torsion
  edge_input_dim: 28   # 16 RBF + 9 edge types + 3 unit vector
  hidden_dim: 64
  encoder_layers: 4
  encoder_dropout: 0.1
  update_coords: true
  householder_depth: 4
  num_sheaf_layers: 1
  sheaf_dropout: 0.1
  static_frames: false
  identity_transport: false
  use_survival: true
  no_equivariant: false

  # Innovation 1: Continuous-time sheaf Neural ODE
  use_ode: true
  ode_solver: "euler"
  ode_rtol: 0.001
  ode_atol: 0.001

  # Innovation 2: Multi-scale sheaf spectral decomposition
  use_multiscale: true
  chebyshev_order: 2
  num_bands: 2

data:
  pocket_cutoff: 10.0
  context_cutoff: 15.0
  edge_cutoff: 5.0
  include_water: true
  num_rbf: 16
  rbf_cutoff: 15.0
  window_size: 10
  stride: 5
  frame_subsample: 1

training:
  stage: "b"  # Stage B — real DD-13M data available
  device: "cuda"
  lr: 0.0001
  weight_decay: 0.00001
  grad_clip: 1.0
  mixed_precision: true
  batch_size: 1
  num_workers: 2
  output_dir: "checkpoints"

  stage_a:
    num_epochs: 50
    lr: 0.0003
  stage_b:
    num_epochs: 5
    lr: 0.0001
  stage_c:
    num_epochs: 5
    lr: 0.00005

losses:
  alpha: 0.1   # regression weight
  beta: 0.05   # ranking weight
  gamma: 0.01  # sheaf smoothness weight
  ranking_margin: 0.5

evaluation:
  splits:
    - random
    - cold_protein
    - cold_scaffold
    - pocket_cluster
    - congeneric_series
    - interaction_deleaked
  output_dir: "results"

seed: 42
