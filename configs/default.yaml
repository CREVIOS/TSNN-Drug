# TSNN Default Configuration
# Equivariant Temporal Sheaf Networks for Protein-Ligand Dissociation Kinetics

model:
  node_input_dim: 29   # max(21 atom, 21 residue) + 3 type flags + 1 charge + 1 SASA + 1 disp + 1 RMSF + 1 torsion
  edge_input_dim: 28   # 16 RBF + 9 edge types + 3 unit vector
  hidden_dim: 128
  encoder_layers: 4
  encoder_dropout: 0.1
  update_coords: true
  householder_depth: 4
  num_sheaf_layers: 1
  sheaf_dropout: 0.1
  static_frames: false
  identity_transport: false
  use_survival: true
  no_equivariant: false

data:
  pocket_cutoff: 10.0
  context_cutoff: 15.0
  edge_cutoff: 5.0
  include_water: true
  num_rbf: 16
  rbf_cutoff: 15.0
  window_size: 20
  stride: 10
  frame_subsample: 1

training:
  stage: "c"  # "a", "b", or "c"
  device: "cuda"
  lr: 1e-4
  weight_decay: 1e-5
  grad_clip: 1.0
  mixed_precision: true
  batch_size: 4
  num_workers: 4
  output_dir: "checkpoints"

  stage_a:
    num_epochs: 50
    lr: 3e-4
  stage_b:
    num_epochs: 30
    lr: 1e-4
  stage_c:
    num_epochs: 100
    lr: 5e-5

losses:
  alpha: 0.1   # regression weight
  beta: 0.05   # ranking weight
  gamma: 0.01  # sheaf smoothness weight
  ranking_margin: 0.5

evaluation:
  splits:
    - random
    - cold_protein
    - cold_scaffold
    - pocket_cluster
    - congeneric_series
    - interaction_deleaked
  output_dir: "results"

seed: 42
